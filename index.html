<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1a3fd4" />
  <title>FlashBet ⚡</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;family=DM+Sans:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;600&amp;display=swap">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f0f4ff;--surface:#ffffff;--surface2:#e8eeff;
      --border:#c5d0f0;--border2:#a0b0e8;
      --accent:#1a3fd4;--accent2:#2f5df5;
      --text:#0a0e2a;--muted:#5a6898;
      --green:#16a34a;--red:#dc2626;--blue:#1a3fd4;
      --radius:12px;
    }
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
    #app{max-width:900px;margin:0 auto;padding:0 18px 80px}

    /* Header */
    .hdr{display:flex;align-items:center;justify-content:space-between;padding:24px 0 28px;border-bottom:1px solid var(--border);margin-bottom:32px;flex-wrap:wrap;gap:12px}
    .logo{display:flex;align-items:center;gap:12px;cursor:pointer;text-decoration:none}
    .logo-mark{width:38px;height:38px;background:var(--accent);border-radius:10px;display:grid;place-items:center;font-size:20px;flex-shrink:0;color:white}
    .logo-text{font-family:'Bebas Neue';font-size:24px;letter-spacing:2px;color:var(--text)}
    .logo-sub{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:-2px}
    .nav{display:flex;gap:8px;flex-wrap:wrap}
    .nav-btn{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'DM Sans';font-size:13px;font-weight:500;padding:7px 15px;border-radius:8px;cursor:pointer;transition:all .2s}
    .nav-btn:hover{border-color:var(--border2);color:var(--text)}
    .nav-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}

    /* Hero */
    .hero{text-align:center;padding:16px 0 44px}
    .hero-label{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:14px}
    .hero-title{font-family:'Bebas Neue';font-size:clamp(48px,10vw,84px);line-height:.95;letter-spacing:2px}
    .hero-title span{color:var(--accent2)}
    .hero-sub{color:var(--muted);font-size:15px;margin-top:14px;max-width:460px;margin-left:auto;margin-right:auto;line-height:1.6}
    .hero-btns{display:flex;justify-content:center;gap:12px;margin-top:28px;flex-wrap:wrap}

    /* Card */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px}
    .card-title{font-family:'Bebas Neue';font-size:20px;letter-spacing:1.5px;margin-bottom:20px;display:flex;align-items:center;gap:10px}
    .dot{width:8px;height:8px;border-radius:2px;background:var(--accent2);flex-shrink:0}

    /* Form */
    .form-group{margin-bottom:18px}
    .lbl{display:block;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
    input,textarea,select{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'DM Sans';font-size:15px;padding:11px 14px;border-radius:8px;transition:border-color .2s;outline:none}
    input:focus,textarea:focus,select:focus{border-color:var(--accent)}
    input::placeholder,textarea::placeholder{color:var(--muted)}
    textarea{resize:vertical;min-height:68px}
    select option{background:var(--surface2)}
    .hint{font-size:12px;color:var(--muted);margin-top:5px}
    .split{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .divider{height:1px;background:var(--border);margin:20px 0}
    .section-sub{font-family:'Bebas Neue';font-size:16px;letter-spacing:1px;color:var(--muted);margin-bottom:14px}

    /* Buttons */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-family:'DM Sans';font-size:14px;font-weight:600;padding:11px 22px;border-radius:8px;border:none;cursor:pointer;transition:all .2s;text-decoration:none}
    .btn:disabled{opacity:.4;cursor:not-allowed}
    .btn-primary{background:var(--accent);color:#fff}
    .btn-primary:hover:not(:disabled){filter:brightness(1.08);transform:translateY(-1px)}
    .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border2)}
    .btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
    .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
    .btn-ghost:hover{color:var(--text);border-color:var(--border2)}
    .btn-danger{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2)}
    .btn-danger:hover{background:rgba(239,68,68,.2)}
    .btn-sm{padding:7px 14px;font-size:13px}
    .btn-lg{padding:14px 32px;font-size:15px;border-radius:10px}
    .btn-venmo{background:#008CFF;color:white}
    .btn-venmo:hover{filter:brightness(1.1)}
    .btn-cashapp{background:#00D64F;color:white}
    .btn-cashapp:hover{filter:brightness(1.1)}

    /* Mode toggle */
    .mode-toggle{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:4px;gap:4px;margin-bottom:10px}
    .mode-btn{flex:1;padding:9px 14px;border-radius:7px;border:none;background:transparent;color:var(--muted);font-family:'DM Sans';font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
    .mode-btn.active{background:var(--surface);color:var(--text);border:1px solid var(--border2);box-shadow:0 2px 8px rgba(0,0,0,.3)}
    .mode-desc{font-size:13px;color:var(--muted);margin-bottom:18px;padding:11px 13px;background:var(--surface2);border-radius:8px;border-left:3px solid var(--accent2);line-height:1.5}

    /* Sides grid */
    .sides-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:start}
    .vs-badge{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;font-family:'Bebas Neue';font-size:17px;color:var(--muted);text-align:center;margin-top:26px}
    .side-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px}
    .side-badge{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:4px;display:inline-block;margin-bottom:10px}
    .side-a .side-badge{background:rgba(26,63,212,.12);color:var(--accent)}
    .side-b .side-badge{background:rgba(255,107,53,.15);color:var(--accent2)}
    .odds-row{display:flex;gap:8px;align-items:center;margin-top:8px}
    .odds-row input{font-family:'JetBrains Mono';font-size:18px;font-weight:600;text-align:center}
    .prob-badge{font-size:11px;padding:4px 8px;border-radius:6px;background:rgba(255,255,255,.06);color:var(--muted);font-family:'JetBrains Mono';white-space:nowrap}

    /* Bet list */
    .bets-grid{display:grid;gap:14px}
    .bet-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 22px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;cursor:pointer;transition:border-color .2s}
    .bet-row:hover{border-color:var(--border2)}
    .bet-row-title{font-size:15px;font-weight:600;margin-bottom:5px;line-height:1.3}
    .bet-row-meta{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);font-family:'JetBrains Mono'}
    .chips{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
    .chip{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 9px;border-radius:5px}
    .chip-open{background:rgba(34,197,94,.12);color:var(--green)}
    .chip-closed{background:rgba(107,107,128,.12);color:var(--muted)}
    .chip-settled{background:rgba(232,255,71,.12);color:var(--accent)}
    .chip-fixed{background:rgba(96,165,250,.12);color:var(--blue)}
    .chip-pool{background:rgba(34,197,94,.12);color:var(--green)}

    /* Market view */
    .market-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px}
    .market-hdr{padding:18px 22px 14px;border-bottom:1px solid var(--border)}
    .market-q{font-family:'Bebas Neue';font-size:clamp(20px,4vw,28px);letter-spacing:1px;line-height:1.1}
    .market-desc{color:var(--muted);font-size:14px;margin-top:7px;line-height:1.5}
    .market-meta{display:flex;gap:10px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
    .market-odds{display:grid;grid-template-columns:1fr 1fr}
    .o-side{padding:18px 22px;cursor:pointer;transition:background .2s;border-right:1px solid var(--border)}
    .o-side:last-child{border-right:none}
    .o-side:hover{background:var(--surface2)}
    .o-side.sel-a{background:rgba(26,63,212,.07);border-bottom:3px solid var(--accent)}
    .o-side.sel-b{background:rgba(255,107,53,.07);border-bottom:3px solid var(--accent2)}
    .o-lbl{font-size:12px;color:var(--muted);margin-bottom:5px}
    .o-name{font-size:16px;font-weight:600;margin-bottom:8px}
    .o-num{font-family:'Bebas Neue';font-size:36px;letter-spacing:1px}
    .o-num.pos{color:var(--green)}.o-num.neg{color:var(--red)}.o-num.pool{color:var(--blue);font-size:28px}
    .o-prob{font-size:11px;color:var(--muted);font-family:'JetBrains Mono';margin-top:3px}

    /* Pool bar */
    .pool-bar-wrap{margin-top:14px}
    .pool-bar-labels{display:flex;justify-content:space-between;margin-bottom:5px;font-size:11px;font-family:'JetBrains Mono'}
    .pool-bar{height:7px;background:var(--surface2);border-radius:4px;overflow:hidden}
    .pool-bar-fill{height:100%;background:linear-gradient(90deg,#1a3fd4,#2f5df5);border-radius:4px;transition:width .5s}

    /* Wager box */
    .wager-box{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px;display:grid;gap:9px}
    .wager-row{display:flex;align-items:center;justify-content:space-between}
    .wager-lbl{font-size:13px;color:var(--muted)}
    .wager-val{font-family:'JetBrains Mono';font-size:14px;font-weight:600}
    .wager-total{font-size:19px;color:var(--green)}

    /* Table */
    .tbl-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse;font-size:14px}
    th{text-align:left;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:9px 12px;border-bottom:1px solid var(--border)}
    td{padding:11px 12px;border-bottom:1px solid var(--border)}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:var(--surface2)}
    .tag-a{color:var(--accent);font-weight:600}
    .tag-b{color:var(--accent2);font-weight:600}

    /* Share box */
    .share-box{background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:18px;margin-bottom:20px}
    .share-url-row{display:flex;gap:10px;margin-top:10px}
    .share-url{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--muted);font-family:'JetBrains Mono';font-size:11px;padding:9px 12px;border-radius:7px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

    /* Toast */
    .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:12px 22px;border-radius:10px;font-size:14px;font-weight:500;z-index:999;box-shadow:0 8px 40px rgba(0,0,0,.5);transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none}
    .toast.show{transform:translateX(-50%) translateY(0)}

    /* Modal */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
    .modal{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:28px;width:100%;max-width:380px}
    .modal h2{font-family:'Bebas Neue';font-size:26px;letter-spacing:1px;margin-bottom:7px}
    .modal p{color:var(--muted);font-size:14px;margin-bottom:20px;line-height:1.5}

    /* PIN */
    .pin-dots{display:flex;gap:12px;justify-content:center;margin:18px 0}
    .pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border2);background:transparent;transition:all .15s}
    .pin-dot.filled{background:var(--accent);border-color:var(--accent)}
    .pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:8px}
    .pin-key{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'DM Sans';font-size:22px;font-weight:600;padding:15px;border-radius:10px;cursor:pointer;transition:all .15s;text-align:center}
    .pin-key:hover{border-color:var(--accent);color:var(--accent)}
    .pin-error{color:var(--red);font-size:13px;text-align:center;margin-top:6px;min-height:18px}

    /* Settle */
    .settle-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .settle-btn{padding:14px;border-radius:10px;border:2px solid var(--border);background:transparent;color:var(--text);font-family:'DM Sans';font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
    .settle-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(232,255,71,.04)}
    .settle-btn.won{border-color:var(--green);background:rgba(34,197,94,.08);color:var(--green)}

    /* Payout */
    .payout-winner{background:linear-gradient(135deg,rgba(22,163,74,.1),rgba(26,63,212,.05));border:1px solid rgba(34,197,94,.22);border-radius:10px;padding:18px 22px;margin-bottom:18px}
    .payout-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--border);gap:10px;flex-wrap:wrap}
    .payout-row:last-child{border-bottom:none}
    .payout-name{font-weight:600;font-size:15px}
    .payout-sub{font-size:12px;color:var(--muted);margin-top:2px}
    .pay-win{font-family:'JetBrains Mono';font-size:16px;font-weight:700;color:var(--green)}
    .pay-lose{font-family:'JetBrains Mono';font-size:15px;font-weight:700;color:var(--red);margin-right:8px}
    .pay-btns{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

    /* AI box */
    .ai-box{background:linear-gradient(135deg,rgba(26,63,212,.06),rgba(47,93,245,.04));border:1px solid rgba(26,63,212,.25);border-radius:12px;padding:18px;margin-bottom:24px}
    .spinner{display:inline-block;width:13px;height:13px;border:2px solid var(--bg);border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Info */
    .info-banner{padding:11px 14px;background:rgba(96,165,250,.07);border:1px solid rgba(96,165,250,.2);border-radius:8px;font-size:13px;color:var(--blue);line-height:1.5;margin-bottom:14px}
    .result-banner{padding:14px 20px;border-radius:10px;margin-bottom:16px;font-weight:600;font-size:15px;background:rgba(232,255,71,.07);border:1px solid rgba(232,255,71,.2);color:var(--accent)}
    .empty{text-align:center;padding:48px 20px;color:var(--muted)}
    .google-btn{display:inline-flex;align-items:center;gap:12px;background:#fff;color:#1a1a1a;border:1px solid #ddd;font-family:'DM Sans';font-size:15px;font-weight:600;padding:13px 24px;border-radius:10px;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.08)}
    .google-btn:hover{box-shadow:0 4px 16px rgba(0,0,0,.14);transform:translateY(-1px)}
    .google-btn img{width:22px;height:22px}
    .auth-wall{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;padding:32px 20px}
    .auth-wall h2{font-family:'Bebas Neue';font-size:32px;letter-spacing:1px;margin-bottom:10px}
    .auth-wall p{color:var(--muted);font-size:15px;margin-bottom:28px;max-width:360px;line-height:1.6}
    .user-avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid var(--accent)}
    .empty-icon{font-size:44px;margin-bottom:14px;opacity:.35}
    .back-btn{display:inline-flex;align-items:center;gap:7px;color:var(--muted);font-size:13px;font-weight:600;background:none;border:none;cursor:pointer;padding:0;margin-bottom:20px;transition:color .2s;font-family:'DM Sans'}
    .back-btn:hover{color:var(--text)}
    .sec-title{font-family:'Bebas Neue';font-size:18px;letter-spacing:1.5px;margin-bottom:14px;color:var(--muted)}

    @media(max-width:600px){
      .split{grid-template-columns:1fr}
      .sides-grid{grid-template-columns:1fr}
      .vs-badge{display:none}
      .market-odds{grid-template-columns:1fr}
      .o-side{border-right:none;border-bottom:1px solid var(--border)}
      .settle-row{grid-template-columns:1fr}
      .share-url-row{flex-direction:column}
    }
  </style>
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>

<script>
// ── Firebase Init ─────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyD_OoDTx-KLapm_uZ6u0SAX4s42aM6wWUc",
  authDomain: "flashbet-53ab0.firebaseapp.com",
  projectId: "flashbet-53ab0",
  storageBucket: "flashbet-53ab0.firebasestorage.app",
  messagingSenderId: "1034655482039",
  appId: "1:1034655482039:web:766241fa1c1822177a0d32",
  measurementId: "G-P7GNQ1EWCR"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const googleProvider = new firebase.auth.GoogleAuthProvider();
const db = firebase.firestore();

// ── Storage ───────────────────────────────────────────────────────────────────
const DB = {
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}},
  get(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}},
  del(k){try{localStorage.removeItem(k)}catch(e){}},
  keys(p){try{return Object.keys(localStorage).filter(k=>k.startsWith(p))}catch{return[]}}
};
function saveBet(b){DB.set('fb_bet:'+b.id,b)}
function loadBet(id){return DB.get('fb_bet:'+id)}
function loadAllBets(){return DB.keys('fb_bet:').map(k=>DB.get(k)).filter(Boolean).sort((a,z)=>z.createdAt-a.createdAt)}
function savePlace(betId,p){DB.set('fb_pl:'+betId+':'+p.id,p)}
function loadPlaces(betId){return DB.keys('fb_pl:'+betId+':').map(k=>DB.get(k)).filter(Boolean)}

// ── Utils ─────────────────────────────────────────────────────────────────────
function uid(){return Math.random().toString(36).slice(2,9).toUpperCase()}
function impliedProb(odds){const n=parseInt(odds);if(isNaN(n))return'50';if(n>0)return((100/(n+100))*100).toFixed(0);return((Math.abs(n)/(Math.abs(n)+100))*100).toFixed(0)}
function fmtOdds(v){const n=parseInt(v);if(isNaN(n))return v||'';return n>0?'+'+n:''+n}
function fixedWin(wager,odds){const n=parseInt(odds);if(isNaN(n)||wager<=0)return 0;if(n>0)return(wager*n)/100;return(wager*100)/Math.abs(n)}
function qs(sel){return document.querySelector(sel)}
function fallbackCopy(text){
  const ta=document.createElement('textarea');
  ta.value=text;ta.style.cssText='position:fixed;opacity:0;top:0;left:0';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');toast('Link copied! 🔗');}
  catch(e){toast('Copy failed — select the URL manually');}
  document.body.removeChild(ta);
}
function el(tag,cls,html){const e=document.createElement(tag);if(cls)e.className=cls;if(html!==undefined)e.innerHTML=html;return e}

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg){const t=qs('#toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600)}

// ── State ─────────────────────────────────────────────────────────────────────
let state = {
  tab: 'home',
  bets: loadAllBets(),
  activeBet: null,
  userName: '',
  userPhoto: '',
  userEmail: '',
  authReady: false,
  pendingNameCb: null,
  friends: [],
  friendBets: [],
};

// Check URL for bet param
const urlBetId = new URLSearchParams(location.search).get('bet');
if(urlBetId){
  const b=loadBet(urlBetId);
  if(b){state.activeBet=b;state.tab='view'}
  // Will also try Firestore after auth is ready (see loadBetFromFirestore)
}

async function loadBetFromFirestore(betId){
  try {
    const doc = await db.collection('bets').doc(betId).get();
    if(doc.exists){
      const bet = {id:doc.id, ...doc.data()};
      saveBet(bet); // cache locally
      // Also load placements
      const placesSnap = await db.collection('placements')
        .where('betId','==',betId).get();
      placesSnap.docs.forEach(d=>{
        const p={...d.data()};
        savePlace(betId, p);
      });
      state.activeBet=bet;

// ── Auth state listener ───────────────────────────────────────────────────────
auth.onAuthStateChanged(user => {
  const wasLoggedOut = !state.userName;
  if(user){
    state.userName = user.displayName || user.email.split('@')[0];
    state.userPhoto = user.photoURL || '';
    state.userEmail = user.email;
    // Load friends from Firestore
    loadFriends();
    // If user just signed in, check for a pending bet to navigate to
    if(wasLoggedOut){
      const pendingBet = localStorage.getItem('fb_pending_bet');
      if(pendingBet){
        localStorage.removeItem('fb_pending_bet');
        const b = loadBet(pendingBet);
        if(b){ state.activeBet=b; state.tab='view'; }
      }
      // Handle incoming friend request
      if(friendEmail && friendName && friendEmail !== state.userEmail){
        (async()=>{
          try {
            const existing = await db.collection('friends')
              .where('userEmail','==',state.userEmail)
              .where('friendEmail','==',friendEmail).get();
            if(existing.empty){
              showFriendRequestModal(friendEmail, friendName);
            } else {
              toast('You are already friends with '+friendName);
            }
          } catch(e){ console.warn('Friend check error:', e.message); }
        })();
      }
    }
  } else {
    state.userName = '';
    state.userPhoto = '';
    state.userEmail = '';
  }
  state.authReady = true;
  // If opened via share link and bet not in local storage, load from Firestore
  if(urlBetId && !state.activeBet){
    render(); // show loading first
    loadBetFromFirestore(urlBetId);
  } else {
    render();
  }
});

function signInWithGoogle(){
  // Save the current bet ID so we can restore it after sign-in
  const betId = new URLSearchParams(location.search).get('bet');
  if(betId) localStorage.setItem('fb_pending_bet', betId);
  auth.signInWithPopup(googleProvider).catch(e=>toast('Sign-in failed: '+e.message));

function signOut(){

// ── Friends (Firestore) ──────────────────────────────────────────────────────
async function loadFriends(){
  if(!state.userEmail) return;
  try {
    const snap = await db.collection('friends')
      .where('userEmail','==',state.userEmail).get();
    state.friends = snap.docs.map(d=>d.data());
    const allBetSnaps = await Promise.all(
      state.friends.map(f=>db.collection('bets').where('creatorEmail','==',f.friendEmail).get())
    );
    state.friendBets = allBetSnaps.flatMap(s=>s.docs.map(d=>({id:d.id,...d.data()})));
    render();
  } catch(e) {
    console.warn('Firestore error (check rules):', e.message);
  }
}

async function syncBetToFirestore(bet){
  if(!state.userEmail) return;
  try {
    await db.collection('bets').doc(bet.id).set({
      ...bet,
      creatorEmail: state.userEmail,
      creatorName: state.userName,
    });
  } catch(e){ console.warn('Sync error:', e.message); }
}

async function acceptFriendRequest(requesterEmail, requesterName){
  const myEmail = state.userEmail;
  const myName = state.userName;
  try {
    await db.collection('friends').add({userEmail:myEmail, userName:myName, friendEmail:requesterEmail, friendName:requesterName, since:Date.now()});
    await db.collection('friends').add({userEmail:requesterEmail, userName:requesterName, friendEmail:myEmail, friendName:myName, since:Date.now()});
    toast('✅ Friend added: '+requesterName);
    loadFriends();
  } catch(e){ toast('Error adding friend — check Firestore rules'); console.error(e); }
}

function generateFriendLink(){
  const base = 'https://flash-bet.vercel.app/';
  return base+'?addfriend='+encodeURIComponent(state.userEmail)+'&name='+encodeURIComponent(state.userName);
}

    loading.style.cssText='display:flex;align-items:center;justify-content:center;min-height:100vh;font-size:32px';
    loading.textContent='⚡';

// ── AI Line Builder ───────────────────────────────────────────────────────────
const AI_SYSTEM=`You are an expert prop bet oddsmaker. Given ANY description of a bet — sports, over/unders, personal challenges, drinking contests, anything — return ONLY valid JSON, no markdown, no preamble.

Handle all types: standard two-sided (Team A vs B, Yes vs No), over/under lines, personal props.

For OVER/UNDER: pick a specific number with .5 to avoid ties. Think carefully.
Examples:
- "friend drinks 12 beers, how many shotguns" → shotgunning is harder, maybe 4-6 in a night, line:4.5, odds near even
- "how many hot dogs in 10min" → casual eater 4-6, line:5.5

Return ONLY this JSON:
{"question":"Specific question ending with ?","category":"Sports|Pop Culture|Personal|Entertainment|Politics|Finance|Other","betType":"standard|over_under","sideAName":"Over 4.5 OR Eagles OR Yes","sideBName":"Under 4.5 OR Chiefs OR No","sideAOdds":-115,"sideBOdds":-105,"line":"4.5","reasoning":"2-3 sentences on line choice and what each side needs"}

For standard bets set line to null. Odds must be integers. Probabilities should add to 102-106%.`;

function renderAIBox(onApply){
  const box=el('div','ai-box');
  box.innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
      <span style="font-size:20px">🤖</span>
      <div>
        <div style="font-family:'Bebas Neue';font-size:19px;letter-spacing:1px;color:var(--accent2)">AI Line Builder</div>

    <textarea id="ai-prompt" placeholder="Examples:&#10;&quot;My friend can drink 12 beers, how many will he shotgun?&quot;&#10;&quot;Eagles vs Chiefs, Eagles are home favorites&quot;&#10;&quot;Me vs Jake, who texts back first&quot;" style="min-height:80px;font-size:14px;margin-bottom:10px"></textarea>
    <button class="btn btn-primary" id="ai-btn" style="width:100%">⚡ Generate Lines</button>
    <div id="ai-error" style="color:var(--red);font-size:13px;margin-top:8px;display:none"></div>
    <div id="ai-result" style="display:none;margin-top:14px;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:14px"></div>`;

  setTimeout(()=>{
    const btn=qs('#ai-btn');
    if(!btn)return;
    btn.onclick=async()=>{
      const prompt=qs('#ai-prompt').value.trim();
      if(!prompt)return;
      btn.disabled=true;
      btn.innerHTML='<span class="spinner"></span> Thinking…';
      qs('#ai-error').style.display='none';
      qs('#ai-result').style.display='none';
      try{
        const res=await fetch('https://api.anthropic.com/v1/messages',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:AI_SYSTEM,messages:[{role:'user',content:prompt}]})
        });
        const data=await res.json();
        const raw=(data.content||[]).map(b=>b.text||'').join('').trim().replace(/^```(?:json)?/gm,'').replace(/```$/gm,'').trim();
        const s=JSON.parse(raw);
        const isOU=s.betType==='over_under';
        const r=qs('#ai-result');
        r.innerHTML=`
          <div style="display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap">
            <span style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:4px;background:rgba(232,255,71,.1);color:var(--accent)">AI Suggested</span>
            <span style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:4px;background:${isOU?'rgba(96,165,250,.1)':'rgba(255,107,53,.1)'};color:${isOU?'var(--blue)':'var(--accent2)'}">${isOU?'Over/Under':'Head-to-Head'}</span>
          </div>
          <div style="font-size:15px;font-weight:600;margin-bottom:14px;line-height:1.3">${s.question}</div>
          <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap;margin-bottom:14px">
            <div style="text-align:center">
              <div style="font-family:'JetBrains Mono';font-size:22px;font-weight:700;color:var(--accent)">${fmtOdds(s.sideAOdds)}</div>
              <div style="font-size:13px;font-weight:600">${s.sideAName}</div>
              <div style="font-size:11px;color:var(--muted);font-family:JetBrains Mono">${impliedProb(s.sideAOdds)}%</div>
            </div>
            ${isOU&&s.line?`<div style="text-align:center;padding:9px 16px;background:var(--surface2);border-radius:9px;border:1px solid var(--border2)"><div style="font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase">Line</div><div style="font-family:'Bebas Neue';font-size:30px;line-height:1">${s.line}</div></div>`:'<div style="color:var(--muted);font-family:\'Bebas Neue\';font-size:15px">VS</div>'}
            <div style="text-align:center">
              <div style="font-family:'JetBrains Mono';font-size:22px;font-weight:700;color:var(--accent2)">${fmtOdds(s.sideBOdds)}</div>
              <div style="font-size:13px;font-weight:600">${s.sideBName}</div>

            <button class="btn btn-ghost btn-sm" id="ai-reset">Try Again</button>

        r.style.display='block';
        qs('#ai-apply').onclick=()=>onApply(s);
        qs('#ai-reset').onclick=()=>{r.style.display='none';qs('#ai-prompt').value='';};
      }catch(e){
        const err=qs('#ai-error');err.textContent='⚠️ Couldn\'t generate lines — try adding more detail.';err.style.display='block';
      }
      btn.disabled=false;btn.innerHTML='⚡ Generate Lines';
    };
  },0);
  return box;
}

      const bind=(id,key)=>{const e=qs('#'+id);if(e)e.oninput=ev=>{createState[key]=ev.target.value;if(key==='sideAOdds'){const p=qs('#prob-a');if(p)p.textContent=impliedProb(ev.target.value)+'%';}if(key==='sideBOdds'){const p=qs('#prob-b');if(p)p.textContent=impliedProb(ev.target.value)+'%';}}};
      bind('c-question','question');bind('c-desc','desc');bind('c-venmo','venmo');bind('c-pin','pin');
      bind('c-aname','sideAName');bind('c-bname','sideBName');bind('c-aodds','sideAOdds');bind('c-bodds','sideBOdds');bind('c-date','closeDate');
      const cat=qs('#c-cat');if(cat)cat.onchange=e=>{createState.category=e.target.value};
      const mf=qs('#mode-fixed');if(mf)mf.onclick=()=>{createState.betMode='fixed';renderCreateForm()};
      const mp=qs('#mode-pool');if(mp)mp.onclick=()=>{createState.betMode='pool';renderCreateForm()};
      const cl=qs('#c-clear');if(cl)cl.onclick=()=>{createState={...createState,question:'',sideAName:'',sideBName:''};renderCreateForm()};
      const sub=qs('#c-submit');
      if(sub)sub.onclick=()=>{
        const cs=createState;
        if(!cs.question.trim()||!cs.sideAName.trim()||!cs.sideBName.trim()){toast('Fill in question and both side names!');return}
        requireName(name=>{
          const bet={
            id:uid(),question:cs.question.trim(),description:cs.desc.trim(),
            category:cs.category,betMode:cs.betMode,
            sideA:{name:cs.sideAName.trim(),odds:cs.betMode==='fixed'?cs.sideAOdds:'+100'},
            sideB:{name:cs.sideBName.trim(),odds:cs.betMode==='fixed'?cs.sideBOdds:'+100'},
            closeDate:cs.closeDate||null,creator:name,
            venmoHandle:cs.venmo.replace('@','').trim()||null,
                        creatorPin:cs.pin||null,
            status:'open',placements:[],createdAt:Date.now()
          };
          saveBet(bet);
          state.bets=[bet,...state.bets];
          toast('Bet created! 🎉');
          setTab('view',bet);
        });
      };
    },0);
  }

  renderCreateForm();
  return d;
}

// ── Bet View ──────────────────────────────────────────────────────────────────
function renderBetView(bet){
  const d=el('div');
  const placements=loadPlaces(bet.id);
  const isPool=bet.betMode==='pool';
  const isOpen=bet.status==='open';
  const isSettled=bet.status==='settled';
  const totalA=placements.filter(p=>p.side==='A').reduce((s,p)=>s+p.wager,0);
  const totalB=placements.filter(p=>p.side==='B').reduce((s,p)=>s+p.wager,0);
  const totalPool=totalA+totalB;
  const shareUrl='https://flash-bet.vercel.app/?bet='+bet.id;

  // Back
  const back=el('button','back-btn','← Back');
  back.onclick=()=>setTab('home');
  d.appendChild(back);

  // Result banner
  if(isSettled){
    const wb=bet.winner==='A'?bet.sideA.name:bet.sideB.name;
    const rb=el('div','result-banner',`🏆 Settled — ${wb} won!${isPool&&totalPool>0?' · $'+totalPool.toFixed(2)+' split among winners':''}`);
    d.appendChild(rb);
  }

  // Market card
  const mc=el('div','market-card');
  const pct=side=>totalPool>0?((side==='A'?totalA:totalB)/totalPool*100).toFixed(0):'50';
  mc.innerHTML=`
    <div class="market-hdr">
      <div class="market-meta">
        <span class="chip chip-${bet.status}">${bet.status}</span>
        <span class="chip ${isPool?'chip-pool':'chip-fixed'}">${isPool?'🏊 Pool':'📊 Fixed Odds'}</span>
        <span style="font-size:12px;color:var(--muted)">${bet.category}</span>
        <span style="font-size:12px;color:var(--muted)">by <b>${bet.creator}</b></span>
      </div>
      <div class="market-q">${bet.question}</div>
      ${bet.description?`<p class="market-desc">${bet.description}</p>`:''}
      ${bet.closeDate?`<p style="font-size:12px;color:var(--muted);margin-top:6px">⏰ Closes: ${new Date(bet.closeDate).toLocaleString()}</p>`:''}
      ${isPool&&totalPool>0?`
      <div class="pool-bar-wrap">
        <div class="pool-bar-labels">
          <span style="color:var(--accent)">${bet.sideA.name} $${totalA.toFixed(0)} (${pct('A')}%)</span>
          <span style="color:var(--muted)">Pool: $${totalPool.toFixed(2)}</span>
          <span style="color:var(--accent2)">${bet.sideB.name} $${totalB.toFixed(0)} (${pct('B')}%)</span>
        </div>
        <div class="pool-bar"><div class="pool-bar-fill" style="width:${pct('A')}%"></div></div>
      </div>`:''}
    </div>
    <div class="market-odds" id="market-odds-row">
      ${['A','B'].map(side=>{
        const s=side==='A'?bet.sideA:bet.sideB;
        const odds=parseInt(s.odds);
        const st=side==='A'?totalA:totalB;
        return `<div class="o-side" id="oside-${side}" data-side="${side}">
          <div class="o-lbl">${isOpen&&!isSettled?'Tap to select':'Side '+side}</div>
          <div class="o-name">${s.name}</div>
          ${isPool
            ?`<div class="o-num pool">${pct(side)}%</div><div class="o-prob">of pool · $${st.toFixed(0)} in</div>`
            :`<div class="o-num ${odds>0?'pos':'neg'}">${fmtOdds(s.odds)}</div><div class="o-prob">${impliedProb(odds)}% implied</div>${totalPool>0?`<div style="font-size:11px;color:var(--muted);margin-top:3px">💰 $${st.toFixed(0)} wagered</div>`:''}`}
        </div>`;
      }).join('')}
    </div>`;
  d.appendChild(mc);

  // Place bet section
  let selectedSide=null;
  const placeBetCard=el('div','card');
  placeBetCard.style.marginBottom='20px';

  function updatePlaceCard(){
    placeBetCard.innerHTML='';
    const ct=el('div','card-title');ct.innerHTML='<div class="dot"></div>Place Your Bet';
    placeBetCard.appendChild(ct);

    // Require sign-in before placing
    if(!state.userName){
      const signinWrap=el('div');
      signinWrap.style.cssText='display:flex;flex-direction:column;align-items:center;gap:14px;padding:16px 0;text-align:center';
      signinWrap.innerHTML=`<p style="color:var(--muted);font-size:14px;margin:0">Sign in with your Google account so we know who's placing the bet.</p>`;
      const btn=el('button','google-btn');
      btn.innerHTML='<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"> Sign in with Google';
      btn.onclick=signInWithGoogle;
      signinWrap.appendChild(btn);
      placeBetCard.appendChild(signinWrap);
      return;
    }

    if(!selectedSide){
      placeBetCard.appendChild(el('p','',`<span style="color:var(--muted)">Tap a side above to place your bet</span>`));
      return;
    }
    const s=selectedSide==='A'?bet.sideA:bet.sideB;
    const fixedOdds=parseInt(s.odds);

    const selRow=el('div');
    selRow.style.cssText='margin-bottom:14px;padding:11px 14px;background:var(--surface2);border-radius:8px;border:1px solid var(--border2);display:flex;justify-content:space-between;align-items:center';
    selRow.innerHTML=`<div><span style="color:var(--muted);font-size:13px">Selected: </span><b style="color:${selectedSide==='A'?'var(--accent)':'var(--accent2)'}">${s.name}</b>${!isPool?`<span style="font-family:'JetBrains Mono';font-size:13px;margin-left:10px">${fmtOdds(fixedOdds)}</span>`:''}</div>`;
    const xb=el('button','btn btn-ghost btn-sm','✕');xb.onclick=()=>{selectedSide=null;updateSelHighlight();updatePlaceCard()};
    selRow.appendChild(xb);
    placeBetCard.appendChild(selRow);

    const wrap=el('div','split');
    // Wager input
    const wg=el('div','form-group');
    wg.innerHTML='<label class="lbl">Wager Amount ($)</label><input type="number" min="1" step="1" id="wager-inp" value="10">';
    wrap.appendChild(wg);

    // Wager box
    const wb=el('div','wager-box');
    wb.id='wager-box';
    wrap.appendChild(wb);
    placeBetCard.appendChild(wrap);

    function updateWagerBox(){
      const wagerNum=parseFloat(qs('#wager-inp')?.value)||0;
      const fpay=fixedWin(wagerNum,fixedOdds);
      let estPool=0;
      if(isPool){
        const sideT=(selectedSide==='A'?totalA:totalB)+wagerNum;
        const newPool=totalPool+wagerNum;
        estPool=sideT>0?(wagerNum/sideT)*newPool:0;
      }
      wb.innerHTML=`
        <div class="wager-row"><span class="wager-lbl">Risk</span><span class="wager-val">$${wagerNum.toFixed(2)}</span></div>
        ${isPool
          ?`<div class="wager-row"><span class="wager-lbl">Est. return if win</span><span class="wager-val" style="color:var(--blue)">$${estPool.toFixed(2)}</span></div><div style="font-size:11px;color:var(--muted)">shifts as more bets come in</div>`
          :`<div class="wager-row"><span class="wager-lbl">Profit if win</span><span class="wager-val">+$${fpay.toFixed(2)}</span></div>
            <div class="wager-row"><span class="wager-lbl">Total payout</span><span class="wager-val wager-total">$${(wagerNum+fpay).toFixed(2)}</span></div>`}`;
    }
    updateWagerBox();
    setTimeout(()=>{const wi=qs('#wager-inp');if(wi)wi.oninput=updateWagerBox},0);

    const placeBtn=el('button','btn btn-primary btn-lg');
    placeBtn.style.width='100%';
    placeBtn.textContent='Bet on '+s.name+' →';
    placeBtn.onclick=()=>{
      const wagerNum=parseFloat(qs('#wager-inp')?.value)||0;
      if(wagerNum<=0){toast('Enter a wager amount!');return}
      requireName(name=>{
        const fixedOdds2=parseInt(s.odds);
        const p={
          id:uid(),betId:bet.id,name,side:selectedSide,sideName:s.name,
          odds:isPool?null:fixedOdds2,wager:wagerNum,
          potentialPayout:isPool?null:fixedWin(wagerNum,fixedOdds2),
          placedAt:Date.now()
        };
        savePlace(bet.id,p);
        // Sync placement to Firestore
        try { db.collection('placements').doc(p.id).set(p); } catch(e){}
        selectedSide=null;
        // Show payment instructions if creator has handles set
        if(bet.venmoHandle||bet.cashappHandle){
          showPaymentInstructions(bet, wagerNum, name);
        } else {
          toast('Bet placed! 🎉');
          state.activeBet=loadBet(bet.id)||bet;
          setTab('view',state.activeBet);
        }
      });
    };
    placeBetCard.appendChild(placeBtn);
  }

  if(isOpen&&!isSettled){
    d.appendChild(placeBetCard);
    updatePlaceCard();
  }

  // Side click handlers
  setTimeout(()=>{
    ['A','B'].forEach(side=>{
      const el2=qs('#oside-'+side);
      if(el2&&isOpen&&!isSettled){
        el2.onclick=()=>{
          selectedSide=selectedSide===side?null:side;
          updateSelHighlight();
          updatePlaceCard();
        };
      }
    });
  },0);

  function updateSelHighlight(){
    ['A','B'].forEach(side=>{
      const el2=qs('#oside-'+side);
      if(el2){el2.className='o-side'+(selectedSide===side?' sel-'+side.toLowerCase():'')}
    });
  }

  // Settle panel (PIN gated)
  if(isOpen){
    d.appendChild(renderSettlePanel(bet,totalPool,isPool));
  }

  // Payout screen
  if(isSettled&&placements.length>0){
    d.appendChild(renderPayoutScreen(bet,placements,isPool,totalPool,totalA,totalB));
  }

  // Placements table
  const ptcard=el('div','card');
  ptcard.style.marginBottom='20px';
  ptcard.innerHTML=`<div class="card-title"><div class="dot"></div>Bets Placed (${placements.length})</div>`;
  if(placements.length===0){
    ptcard.innerHTML+=`<div class="empty" style="padding:28px 0"><p>No bets yet. Share the link!</p></div>`;
  } else {
    const tw=el('div','tbl-wrap');
    let thead=`<tr><th>Name</th><th>Side</th>${!isPool?'<th>Odds</th>':''}<th>Wager</th><th>${isPool?'Share':'Potential Win'}</th>${isSettled?'<th>Result</th>':''}`;
    const winnerTotal=isPool&&isSettled?placements.filter(p=>p.side===bet.winner).reduce((s,p)=>s+p.wager,0):0;
    let rows=placements.map(p=>{
      const won=isSettled&&p.side===bet.winner;
      const sideT=p.side==='A'?totalA:totalB;
      const share=sideT>0?((p.wager/sideT)*100).toFixed(1):'—';
      let poolPay=0;if(isPool&&isSettled&&won&&winnerTotal>0)poolPay=(p.wager/winnerTotal)*totalPool;
      return `<tr>
        <td style="font-weight:600">${p.name}</td>
        <td><span class="tag-${p.side.toLowerCase()}">${p.sideName}</span></td>
        ${!isPool?`<td style="font-family:'JetBrains Mono'">${fmtOdds(p.odds)}</td>`:''}
        <td style="font-family:'JetBrains Mono'">$${p.wager.toFixed(2)}</td>
        <td style="font-family:'JetBrains Mono';color:var(--blue)">${isPool?share+'%':'+$'+(p.potentialPayout||0).toFixed(2)}</td>
        ${isSettled?`<td style="font-weight:700;color:${won?'var(--green)':'var(--red)'}">${won?(isPool?'+$'+(poolPay-p.wager).toFixed(2)+' ✓':'+$'+(p.potentialPayout||0).toFixed(2)+' ✓'):'-$'+p.wager.toFixed(2)+' ✗'}</td>`:''}
      </tr>`;
    }).join('');
    tw.innerHTML=`<table><thead>${thead}</thead><tbody>${rows}</tbody></table>`;
    ptcard.appendChild(tw);
  }
  d.appendChild(ptcard);

  // Share box
  const sb=el('div','share-box');
  sb.innerHTML=`
    <div style="font-family:'Bebas Neue';font-size:17px;letter-spacing:1px;margin-bottom:5px">Share This Bet</div>
    <p style="font-size:13px;color:var(--muted)">Friends tap the link → pick a side → bet. No signup needed.</p>
    <div class="share-url-row">
      <div class="share-url">${shareUrl}</div>
      <button class="btn btn-primary" id="copy-link-btn">Copy Link</button>
    </div>`;
  d.appendChild(sb);
  setTimeout(()=>{
    const cb=qs('#copy-link-btn');
    if(cb)cb.onclick=()=>{
      // Try modern clipboard API first, fall back to execCommand
      if(navigator.clipboard&&navigator.clipboard.writeText){
        navigator.clipboard.writeText(shareUrl).then(()=>toast('Link copied! 🔗')).catch(()=>fallbackCopy(shareUrl));
      } else {
        fallbackCopy(shareUrl);
      }
    };
  },0);

  return d;
}

// ── Settle Panel ──────────────────────────────────────────────────────────────
function renderSettlePanel(bet,totalPool,isPool){
  const card=el('div','card');
  card.style.marginBottom='20px';
  card.innerHTML=`
    <div class="card-title"><div class="dot"></div>Settle Bet</div>
    ${isPool&&totalPool>0?`<div class="info-banner">🏊 Pool: $${totalPool.toFixed(2)} — 100% splits to winners.</div>`:''}
    ${bet.creatorPin?'<div style="font-size:13px;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:7px">🔐 PIN-protected — only the creator can settle</div>':''}
    <p style="color:var(--muted);font-size:13px;margin-bottom:14px">Once the event is over, declare the winner:</p>
    <div class="settle-row">
      <button class="settle-btn${bet.winner==='A'?' won':''}" id="settle-a">🏆 ${bet.sideA.name} Wins</button>
      <button class="settle-btn${bet.winner==='B'?' won':''}" id="settle-b">🏆 ${bet.sideB.name} Wins</button>
    </div>
    <div style="margin-top:12px">
      <button class="btn btn-danger btn-sm" id="close-bet-btn">🔒 Close Betting</button>
    </div>`;

  function doSettle(side){
    const updated={...bet,status:'settled',winner:side,settledAt:Date.now()};
    saveBet(updated);
    state.bets=state.bets.map(b=>b.id===bet.id?updated:b);
    toast((side==='A'?bet.sideA.name:bet.sideB.name)+' wins! 🏆');
    setTab('view',updated);
  }
  function doClose(){
    const updated={...bet,status:'closed'};
    saveBet(updated);
    state.bets=state.bets.map(b=>b.id===bet.id?updated:b);
    toast('Betting closed.');
    setTab('view',updated);
  }

  function withPin(action){
    if(!bet.creatorPin){action();return}
    showPinModal(bet.creatorPin,action);
  }

  setTimeout(()=>{
    const sa=qs('#settle-a');if(sa)sa.onclick=()=>withPin(()=>doSettle('A'));
    const sb=qs('#settle-b');if(sb)sb.onclick=()=>withPin(()=>doSettle('B'));
    const cb=qs('#close-bet-btn');if(cb)cb.onclick=()=>withPin(doClose);
  },0);

  return card;
}

// ── Friends UI ───────────────────────────────────────────────────────────────
function renderFriends(){
  const d=el('div');
  d.appendChild(el('div','sec-title','Friends'));

  // Add friend card
  const addCard=el('div','card');
  addCard.style.marginBottom='20px';
  addCard.innerHTML=`<div class="card-title"><div class="dot"></div>Add a Friend</div>
    <p style="font-size:14px;color:var(--muted);margin-bottom:16px">Share your friend link — when they open it and sign in, you're connected automatically.</p>`;
  const copyBtn=el('button','btn btn-primary');
  copyBtn.textContent='📋 Copy My Friend Link';
  copyBtn.onclick=()=>{
    const link=generateFriendLink();
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(link).then(()=>toast('Friend link copied! Send it to them 🔗')).catch(()=>fallbackCopy(link));
    } else { fallbackCopy(link); }
  };
  addCard.appendChild(copyBtn);
  d.appendChild(addCard);

  // Friends list
  const listCard=el('div','card');
  listCard.style.marginBottom='20px';
  listCard.innerHTML=`<div class="card-title"><div class="dot"></div>My Friends (${state.friends.length})</div>`;

  if(!state.friends.length){
    listCard.appendChild(el('p','',`<span style="color:var(--muted);font-size:14px">No friends yet — share your link to get started!</span>`));
  } else {
    // Build win/loss record per friend
    const allBets=[...loadAllBets(),...state.friendBets];
    state.friends.forEach(f=>{
      const row=el('div');
      row.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)';

      // Calculate W/L record against this friend
      const sharedBets=allBets.filter(b=>{
        const places=loadPlaces(b.id);
        const myPlace=places.find(p=>p.name===state.userName);
        const theirPlace=places.find(p=>p.name===f.friendName);
        return myPlace&&theirPlace&&b.status==='settled';
      });
      let wins=0,losses=0;
      sharedBets.forEach(b=>{
        const places=loadPlaces(b.id);
        const myPlace=places.find(p=>p.name===state.userName);
        if(myPlace&&b.winner===myPlace.side) wins++;
        else losses++;
      });

      row.innerHTML=`
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:36px;height:36px;border-radius:50%;background:var(--accent);display:grid;place-items:center;font-size:16px;color:#fff;font-weight:700">${f.friendName.charAt(0).toUpperCase()}</div>
          <div>
            <div style="font-weight:600;font-size:15px">${f.friendName}</div>
            <div style="font-size:12px;color:var(--muted)">${f.friendEmail}</div>
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-family:'JetBrains Mono';font-size:15px"><span style="color:var(--green)">${wins}W</span> <span style="color:var(--muted)">-</span> <span style="color:var(--red)">${losses}L</span></div>
          <div style="font-size:11px;color:var(--muted)">${sharedBets.length} shared bet${sharedBets.length!==1?'s':''}</div>
        </div>`;
      listCard.appendChild(row);
    });
  }
  d.appendChild(listCard);

  // Friend bets feed
  if(state.friendBets.length){
    d.appendChild(el('div','sec-title',"Friends' Bets"));
    const grid=el('div','bets-grid');
    state.friendBets.forEach(b=>grid.appendChild(renderBetRow(b)));
    d.appendChild(grid);
  }

  return d;
}

  overlay.innerHTML=`
    <div class="modal" style="max-width:380px;text-align:center">
      <div style="font-size:40px;margin-bottom:12px">👋</div>
      <h2 style="margin-bottom:8px">${reqName} wants to be friends!</h2>
      <p style="color:var(--muted);font-size:14px;margin-bottom:24px">Accept to see each other's bets and track your head-to-head record.</p>
      <div style="display:flex;gap:10px">
        <button class="btn btn-ghost" id="fr-decline" style="flex:1">Decline</button>

}

// ── Payment Instructions Modal ───────────────────────────────────────────────
function showPaymentInstructions(bet, wagerNum, betterName){
  const venmo=bet.venmoHandle;
  const note=`FlashBet: ${bet.question.slice(0,50)}`;
  function venmoLink(h,amt){return`https://venmo.com/${h}?txn=pay&amount=${amt.toFixed(2)}&note=${encodeURIComponent(note)}`}

  const overlay=el('div','overlay');
  overlay.innerHTML=`
    <div class="modal" style="max-width:400px">
      <div style="font-size:36px;text-align:center;margin-bottom:10px">💸</div>
      <h2 style="text-align:center;margin-bottom:8px">Pay to Lock In Your Bet</h2>
      <p style="text-align:center;margin-bottom:20px">Bet recorded! Now Venmo your wager to <b style="color:var(--accent)">${bet.creator}</b>. They hold the money and pay out winners after it settles.</p>
      ${venmo
        ? `<a href="${venmoLink(venmo,wagerNum)}" target="_blank" class="btn btn-venmo btn-lg" style="width:100%;justify-content:center;font-size:15px;margin-bottom:10px">
             📱 Send $${wagerNum.toFixed(2)} to @${venmo} on Venmo
           </a>
           <p style="text-align:center;font-size:12px;color:var(--muted)">Opens Venmo with everything pre-filled.</p>`
        : `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center;margin-bottom:10px">
             Send <b style="color:var(--accent);font-size:20px">$${wagerNum.toFixed(2)}</b> to <b>${bet.creator}</b> on Venmo.
           </div>`
      }
      <button class="btn btn-ghost" id="pay-done-btn" style="width:100%;margin-top:14px">Got it ✓</button>
    </div>`;
  document.body.appendChild(overlay);
  setTimeout(()=>{
    const btn=qs('#pay-done-btn');
    if(btn)btn.onclick=()=>{
      document.body.removeChild(overlay);
      toast('Bet placed! 💸 Venmo ' + bet.creator + ' $' + wagerNum.toFixed(2));
      state.activeBet=loadBet(bet.id)||bet;
      setTab('view',state.activeBet);
    };
  },0);
}
// ── Payout Screen ─────────────────────────────────────────────────────────────
function renderPayoutScreen(bet,placements,isPool,totalPool,totalA,totalB){
  const winner=bet.winner;
  const winnerName=winner==='A'?bet.sideA.name:bet.sideB.name;
  const winnerTotal=placements.filter(p=>p.side===winner).reduce((s,p)=>s+p.wager,0);
  const winners=placements.filter(p=>p.side===winner);
  const losers=placements.filter(p=>p.side!==winner);
  const venmo=bet.venmoHandle;
  const cashapp=bet.cashappHandle;
  const hasHandles=venmo||cashapp;

  function poolProfit(p){if(!winnerTotal)return 0;return(p.wager/winnerTotal)*totalPool-p.wager}
  function venmoLink(handle,amt,note){return`https://venmo.com/${handle}?txn=pay&amount=${amt.toFixed(2)}&note=${encodeURIComponent(note)}`}
  function cashLink(handle,amt){return`https://cash.app/$${handle}/${amt.toFixed(2)}`}

  const card=el('div','card');
  card.style.marginBottom='20px';

  // Header
  let html=`<div class="card-title"><div class="dot"></div>💸 Payout Summary</div>
    <div class="payout-winner">
      <div style="font-family:'Bebas Neue';font-size:22px;letter-spacing:1px;color:var(--green);margin-bottom:4px">🏆 ${winnerName} Won!</div>
      <div style="font-size:13px;color:var(--muted)">${isPool?`Total pool: $${totalPool.toFixed(2)} · split among ${winners.length} winner${winners.length!==1?'s':''}`:`${winners.length} winner${winners.length!==1?'s':''} · losers pay below`}</div>
    </div>`;

  // Each loser gets a bold card showing exactly what to do
  // ── Winners: creator pays them out ──────────────────────────────────────────
  if(winners.length){
    html+=`<div style="font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--green);margin-bottom:10px">✅ Winners — ${bet.creator}, pay these people</div>`;
    winners.forEach(p=>{
      const profit=isPool?poolProfit(p):(p.potentialPayout||0);
      const totalBack=p.wager+profit;
      // Venmo link: creator sends money TO winner
      const note=`FlashBet win: ${bet.question.slice(0,45)}`;
      const payLink=venmo&&p.name!==bet.creator
        ?`https://venmo.com/${p.name.toLowerCase().replace(/\s+/g,'')}?txn=pay&amount=${totalBack.toFixed(2)}&note=${encodeURIComponent(note)}`
        :null;
      html+=`<div style="background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.18);border-radius:10px;padding:14px 16px;margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${payLink?'10px':'0'}">
          <div>
            <div style="font-weight:700;font-size:16px">${p.name}</div>
            <div style="font-size:12px;color:var(--muted)">Wagered $${p.wager.toFixed(2)} · wins $${profit.toFixed(2)} profit</div>
          </div>
          <div style="font-family:'JetBrains Mono';font-size:22px;font-weight:700;color:var(--green)">$${totalBack.toFixed(2)}</div>
        </div>
        ${payLink?`<a href="${payLink}" target="_blank" class="btn btn-venmo" style="width:100%;justify-content:center">📱 Send $${totalBack.toFixed(2)} to ${p.name} on Venmo</a>`:''}
      </div>`;
    });
  }

  // ── Losers: already paid creator upfront, nothing to do ──────────────────
  if(losers.length){
    html+=`<div style="font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin:14px 0 10px">❌ Losers — already paid ${bet.creator} upfront</div>`;
    losers.forEach(p=>{
      html+=`<div style="background:rgba(107,107,128,.06);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
        <div style="font-weight:600;font-size:15px">${p.name}</div>
        <div style="font-family:'JetBrains Mono';font-size:16px;color:var(--muted)">-$${p.wager.toFixed(2)}</div>
      </div>`;
    });
  }

  card.innerHTML=html;
  return card;
}

// ── PIN Modal ─────────────────────────────────────────────────────────────────
function showPinModal(correctPin,onSuccess){
  let pin='';
  const overlay=el('div','overlay');
  function updateDots(){
    document.querySelectorAll('.pin-dot').forEach((d,i)=>d.classList.toggle('filled',i<pin.length));
    const err=qs('#pin-err');if(err)err.textContent='';
  }
  overlay.innerHTML=`
    <div class="modal">
      <h2>Creator PIN</h2>
      <p>Enter your 4-digit PIN to continue.</p>
      <div class="pin-dots">${[0,1,2,3].map(i=>`<div class="pin-dot"></div>`).join('')}</div>
      <div id="pin-err" class="pin-error"></div>
      <div class="pin-grid">
        ${['1','2','3','4','5','6','7','8','9','','0','⌫'].map(k=>
          k===''?`<div></div>`:`<button class="pin-key" data-k="${k}">${k}</button>`
        ).join('')}
      </div>
    </div>`;
  overlay.onclick=e=>{if(e.target===overlay)document.body.removeChild(overlay)};
  overlay.querySelectorAll('.pin-key').forEach(btn=>{
    btn.onclick=()=>{
      const k=btn.dataset.k;
      if(k==='⌫'){pin=pin.slice(0,-1);updateDots();return}
      if(pin.length>=4)return;
      pin+=k;
      updateDots();
      if(pin.length===4){
        if(pin===correctPin){document.body.removeChild(overlay);onSuccess();}
        else{const err=qs('#pin-err');if(err)err.textContent='Wrong PIN. Try again.';setTimeout(()=>{pin='';updateDots();},700);}
      }
    };
  });
  document.body.appendChild(overlay);
}

// ── Name Modal ────────────────────────────────────────────────────────────────
function showNameModal(cb){
  const overlay=el('div','overlay');
  overlay.innerHTML=`
    <div class="modal">
      <h2>What's your name?</h2>
      <p>So your friends know who placed the bet.</p>
      <div class="form-group"><input id="name-inp" placeholder="e.g. Jake" autocomplete="off"></div>
      <button class="btn btn-primary btn-lg" id="name-confirm" style="width:100%">Let's go →</button>
    </div>`;
  document.body.appendChild(overlay);
  setTimeout(()=>{
    const inp=qs('#name-inp');if(inp)inp.focus();
    const confirm=()=>{
      const v=qs('#name-inp')?.value.trim();
      if(!v)return;
      localStorage.setItem('fb_name',v);
      state.userName=v;
      document.body.removeChild(overlay);
      cb(v);
    };
    const btn=qs('#name-confirm');if(btn)btn.onclick=confirm;
    const inp2=qs('#name-inp');if(inp2)inp2.onkeydown=e=>{if(e.key==='Enter')confirm()};
  },0);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
render();
</script>
